---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    config.kubernetes.io/origin: |
      configuredIn: kustomization.yaml
      configuredBy:
        apiVersion: builtin
        kind: HelmChartInflationGenerator
    foo: baz
  labels:
    app: foo
    test-case: hydration
    version: 1.0.0
  name: repo-sync-deployment
  namespace: simple-ns
spec:
  selector:
    matchLabels:
      app: foo
      test-case: hydration
  template:
    metadata:
      labels:
        app: foo
        test-case: hydration
    spec:
      containers:
      - image: nginx
        imagePullPolicy: Always
        name: nginx
