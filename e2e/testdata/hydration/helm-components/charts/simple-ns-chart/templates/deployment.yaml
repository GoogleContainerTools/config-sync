---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: foo
    version: {{ .Chart.Version }}
  name: repo-sync-deployment
  annotations:
    foo: {{ .Values.annotations.foo }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: foo
  template:
    metadata:
      labels:
        app: foo
    spec:
      containers:
      - image: nginx
        imagePullPolicy: Always
        name: nginx